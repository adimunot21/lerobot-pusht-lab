# Diffusion Policy training config for lerobot/pusht
#
# All non-default values are annotated with their reason.
# Hardware target: NVIDIA GTX 1650 / 4 GB VRAM (see PLAN.md §3 for fallback ladder).
#
# Usage:
#   lerobot-train --config_path=configs/diffusion_pusht.yaml          # full run
#   lerobot-train --config_path=configs/diffusion_pusht.yaml \
#       --steps=100 --eval_freq=1000 --save_freq=1000 \
#       --output_dir=checkpoints/diffusion_pusht_smoke               # smoke test
# Wrapped by: scripts/train_diffusion.sh
# Format: draccus YAML (LeRobot 0.5.1 — `type:` is the discriminator field for
# policy/env subclasses, mirroring the dataclass hierarchy).

# ─── Dataset ─────────────────────────────────────────────────────────────────
dataset:
  repo_id: lerobot/pusht
  # All other fields default. The DiffusionConfig preset auto-fills
  # `delta_timestamps` to fetch action chunks of length `horizon`.

# ─── Environment (for in-training eval rollouts) ─────────────────────────────
env:
  type: pusht
  # Match env render resolution to the dataset's 96×96. Default is 384×384,
  # which would force LeRobot's eval pipeline to downsample at every step —
  # wasteful and a potential silent-error surface if the resize differs from
  # what the policy's vision encoder was trained on.
  observation_width: 96
  observation_height: 96
  # episode_length=300 default — fine; PushT episodes terminate on success.

# ─── Policy ──────────────────────────────────────────────────────────────────
policy:
  type: diffusion
  device: cuda
  # AMP halves activation memory at no measurable quality cost on PushT.
  # Mandatory on 4 GB VRAM. Default is false because LeRobot supports CPU-only
  # training where AMP would hurt; we have CUDA so we enable it.
  use_amp: true
  # Default is true → would auto-upload mid-training. We push manually in Phase 6.
  push_to_hub: false
  #
  # U-Net width: using LeRobot's default (512, 1024, 2048) = 263M params, which
  # matches the recipe LeRobot's published `lerobot/diffusion_pusht` model card
  # was trained with (65.4% success on 500 eval episodes). Hits the original
  # Chi et al. 2023 paper-level numbers (~85-91%) on PushT.
  #
  # To run on a 4 GB laptop GPU instead (e.g. GTX 1650), override on the CLI:
  #   ./scripts/train_diffusion.sh --policy.down_dims="[256,512,1024]"
  # This shrinks the U-Net to ~76M params (the original paper's image-task size,
  # not LeRobot's larger default), which fits in 4 GB but caps you at ~50-65%.
  # Verified during 2026-05-09 smoke tests: full 263M OOMs at optimizer.step()
  # on 4 GB; the (256, 512, 1024) override is the binding fallback.
  #
  # Other algorithm hyperparams default to the paper recipe. Listed explicitly
  # here as a paper trail, not as overrides:
  #   horizon=16, n_action_steps=8, n_obs_steps=2
  #     → predict 16 actions, execute 8, condition on 2 obs frames.
  #     → standard receding-horizon control. Shortening hurts coherence;
  #       lengthening makes learning harder.
  #   vision_backbone=resnet18  → ~11M params; ~10× smaller than resnet50 and
  #     fine for 96×96 inputs. resnet50 would push us back into OOM territory.
  #   num_train_timesteps=100, noise_scheduler=DDPM, beta_schedule=squaredcos_cap_v2
  #     → standard DDPM with cosine-squared β schedule (improves over linear at high T).
  #   optimizer_lr=1e-4, weight_decay=1e-6, scheduler=cosine, warmup=500
  #     → paper recipe. Adam variants only differ in 3rd decimal on this task.

# ─── Training loop ───────────────────────────────────────────────────────────
batch_size: 64        # MATCHES LeRobot's published recipe (lerobot/diffusion_pusht
                      # reports 65.4% success on 500-episode eval at this batch).
                      # Originally I used batch=8 + 50K steps = 400K samples seen,
                      # which produced 5% success — under-trained by 32× vs published.
                      # Smoke sweep on the 1650 (2026-05-10):
                      #   batch=8   → 1.6 GB peak, 8.3 step/s,  66 samples/s
                      #   batch=32  → 1.7 GB peak, 5.5 step/s, 174 samples/s
                      #   batch=48  → 1.8 GB peak, 4.4 step/s, 209 samples/s
                      #   batch=64  → 2.9 GB peak, 3.7 step/s, 237 samples/s ← chosen
                      # 64 is the sweet spot — matches the recipe with ~1.2 GB headroom,
                      # maximises samples/sec, fits on a 4 GB card. LeRobot 0.5.1 does
                      # not expose gradient accumulation, so batch == effective batch.
num_workers: 4        # default; leaves 2 cores for the main process on 6-core CPU.

steps: 200000         # Matches LeRobot's published recipe: 200K × 64 = 12.8M samples.
                      # At 3.7 step/s on the 1650 ≈ 15 h pure training; +5 evals at
                      # ~13 min each = ~16–17 h total wall time.
                      # Justification: the 50K-step run on 2026-05-10 left loss still
                      # descending (0.026 → 0.023 in last 10K) and the cosine LR schedule
                      # had decayed lr→2.5e-8 — both classic signs of severe under-training.
                      # 200K with the schedule scaled to the new total length fixes it.

seed: 1000            # default — reproducibility.
log_freq: 200         # default — wandb scalar every 200 steps.
eval_freq: 40000      # 5 in-training evals (every 20% of training). Each eval ≈ 13 min.
save_freq: 40000      # 5 checkpoints across the run. Last is the deliverable for Phase 5.
save_checkpoint: true

output_dir: checkpoints/diffusion_pusht
job_name: diffusion_pusht

# ─── In-training eval ────────────────────────────────────────────────────────
eval:
  n_episodes: 20      # 20 is enough to detect "is the policy alive?". Final
                      # 50-episode eval (with confidence intervals) is in Phase 5.
  batch_size: 1       # one rollout at a time — gym-pusht is CPU-fast,
                      # parallelism would just thrash threads.

# ─── Logging ─────────────────────────────────────────────────────────────────
wandb:
  enable: true        # Required for any plottable logs — LeRobot 0.5.1 has no
                      # TensorBoard fallback (verified Phase 2 smoke test).
  mode: offline       # MUST be set here, not via WANDB_MODE env var — LeRobot's
                      # WandBLogger passes mode= explicitly to wandb.init(),
                      # overriding the env var. "offline" writes to ./wandb/
                      # locally, never contacts cloud, no auth needed.
                      # Sync later via `wandb sync ./wandb/offline-run-*`.
  project: lerobot-pusht-lab   # Default is "lerobot"; we namespace per-project so
                                # any future cloud sync goes to a sensible bucket.
